<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taufe von Lucas · Βάφτιση του Λουκά</title>
    <!-- Tailwind (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet (interactive locations map, no API key required) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- React + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel to transform the JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
      }
      /* Language toggle, fixed in the top-right corner */
      #lang-switch {
        /* absolute (not fixed): sits at the very top and scrolls away with the
           page instead of floating over the content while scrolling. */
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 50;
        display: flex;
        gap: 0.25rem;
        padding: 0.25rem;
        border-radius: 9999px;
        border: 1px solid #b9cde7;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(6px);
        box-shadow: 0 1px 3px rgba(24, 59, 120, 0.12);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #lang-switch button {
        cursor: pointer;
        border: none;
        border-radius: 9999px;
        padding: 0.35rem 0.85rem;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: #183b78;
        background: transparent;
      }
      #lang-switch button[aria-pressed="true"] {
        background: #183b78;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="lang-switch">
      <button type="button" data-lang="de">DE</button>
      <button type="button" data-lang="el">EL</button>
    </div>
    <div id="root"></div>

    <script>
      // Map each language to its component file.
      const SOURCES = {
        de: "./tauf_website_vorlage.jsx",
        el: "./tauf_website_el.jsx",
      };

      const root = document.getElementById("root");
      const reactRoot = ReactDOM.createRoot(root);
      const buttons = Array.from(
        document.querySelectorAll("#lang-switch button")
      );
      // Cache transformed components so switching back is instant.
      const cache = {};

      async function loadComponent(lang) {
        if (cache[lang]) return cache[lang];

        const res = await fetch(SOURCES[lang]);
        if (!res.ok) {
          throw new Error("HTTP " + res.status + " (" + SOURCES[lang] + ")");
        }
        let source = await res.text();

        // Strip the ES module `export default` so we can eval the component
        // in a plain script scope and grab the function by name.
        source = source.replace(
          /export\s+default\s+function\s+BaptismWebsite/,
          "function BaptismWebsite"
        );

        // Use the *classic* JSX runtime so the output calls the global
        // React.createElement instead of emitting an `import ... from
        // "react/jsx-runtime"` line (which fails inside new Function()).
        const { code } = Babel.transform(source, {
          presets: [["react", { runtime: "classic" }]],
        });

        const BaptismWebsite = new Function(
          "React",
          code + "\nreturn BaptismWebsite;"
        )(React);

        cache[lang] = BaptismWebsite;
        return BaptismWebsite;
      }

      async function render(lang) {
        try {
          const BaptismWebsite = await loadComponent(lang);
          reactRoot.render(React.createElement(BaptismWebsite));
          document.documentElement.lang = lang;
          try {
            localStorage.setItem("lang", lang);
          } catch (e) {
            /* storage may be blocked; not critical */
          }
          buttons.forEach((btn) =>
            btn.setAttribute(
              "aria-pressed",
              btn.dataset.lang === lang ? "true" : "false"
            )
          );
        } catch (err) {
          const label = lang === "el" ? "Σφάλμα κατά τη φόρτωση της σελίδας:" : "Fehler beim Laden der Seite:";
          root.innerHTML =
            '<pre style="padding:2rem;color:#b91c1c;font-family:monospace;white-space:pre-wrap;">' +
            label +
            "\n" +
            (err && err.message ? err.message : String(err)) +
            "</pre>";
          console.error(err);
        }
      }

      buttons.forEach((btn) =>
        btn.addEventListener("click", () => render(btn.dataset.lang))
      );

      // Default to German, but restore the visitor's last choice if any.
      let initial = "de";
      try {
        const saved = localStorage.getItem("lang");
        if (saved && SOURCES[saved]) initial = saved;
      } catch (e) {
        /* ignore */
      }
      render(initial);
    </script>
  </body>
</html>
